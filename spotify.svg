<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120">
  <defs>
    <style>
      .bg { fill: #181818; }
      .text-title { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 16px; font-weight: bold; fill: #ffffff; }
      .text-artist { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 13px; fill: #b3b3b3; }
      .bar { fill: #1DB954; animation: bounce 0.8s infinite ease-in-out alternate; }
      .b1 { animation-delay: 0s; }
      .b2 { animation-delay: -0.2s; }
      .b3 { animation-delay: -0.4s; }
      .b4 { animation-delay: -0.6s; }
      @keyframes bounce {
        0% { height: 4px; y: 11px; }
        100% { height: 15px; y: 0px; }
      }
    </style>
    <clipPath id="cover-clip">
      <rect x="20" y="20" width="80" height="80" rx="8" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" rx="16" class="bg" />
  
  <!-- Spotify Logo (Simplified SVG path) -->
  <path fill="#1DB954" d="M363.3,28.7c-9.1-9.1-23.7-9.1-32.8,0c-9.1,9.1-9.1,23.7,0,32.8c9.1,9.1,23.7,9.1,32.8,0 C372.3,52.4,372.3,37.8,363.3,28.7z M353.4,53.4c-1.3,2.1-4,2.8-6.1,1.5c-6.8-4.2-15.3-5.1-25.4-2.8c-2.4,0.5-4.8-1-5.3-3.4 c-0.5-2.4,1-4.8,3.4-5.3c11.6-2.6,21.3-1.5,29.3,3.4C351.4,48.1,352.1,50.8,353.4,53.4z M355.6,43.2c-1.6,2.6-5.1,3.4-7.7,1.8 c-8.5-5.2-19.1-6.5-29.2-3.4c-2.9,0.9-6.1-0.7-7-3.6c-0.9-2.9,0.7-6.1,3.6-7c11.6-3.6,23.7-2.1,33.5,3.9 C351.3,36.5,352.2,40.1,355.6,43.2z M357.6,32.5c-10.2-6.1-27-6.6-36.6-3.7c-3.6,1.1-7.4-0.9-8.4-4.5c-1.1-3.6,0.9-7.4,4.5-8.4 c11.3-3.4,30-2.8,41.9,4.3c3.2,1.9,4.3,6.1,2.4,9.3C359.5,32.8,355.4,33.9,357.6,32.5z" transform="translate(10, 5) scale(0.08)"/>

  <!-- Album Cover -->
  <image x="20" y="20" width="80" height="80" clip-path="url(#cover-clip)" href="https://i.scdn.co/image/ab67616d0000b273422c622517ea0bd7eda33e08" />
  
  <!-- Text Info -->
  <text x="115" y="50" class="text-title">Stranded</text>
  <text x="115" y="70" class="text-artist">Gojira</text>
  
  <!-- Progress Bar -->
  <rect x="115" y="85" width="220" height="4" rx="2" fill="#535353" />
  <rect x="115" y="85" width="80" height="4" rx="2" fill="#ffffff" />
  <circle cx="195" cy="87" r="4" fill="#ffffff" />
  
  <!-- Animated Equalizer -->
  <g transform="translate(350, 74)">
    <rect class="bar b1" x="0" y="11" width="3" height="4" rx="1.5" />
    <rect class="bar b2" x="5" y="11" width="3" height="4" rx="1.5" />
    <rect class="bar b3" x="10" y="11" width="3" height="4" rx="1.5" />
    <rect class="bar b4" x="15" y="11" width="3" height="4" rx="1.5" />
  </g>
</svg>
