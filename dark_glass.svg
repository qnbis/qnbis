<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#141418" />
      <stop offset="100%" stop-color="#0d0d14" />
    </radialGradient>
    <linearGradient id="orb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D55" />
      <stop offset="100%" stop-color="#5856D6" />
    </linearGradient>
    <linearGradient id="orb2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE" />
      <stop offset="100%" stop-color="#32ADE6" />
    </linearGradient>
    <filter id="glass-blur">
      <feGaussianBlur stdDeviation="20" />
    </filter>
  </defs>

  <rect width="800" height="300" fill="url(#bg)" rx="16" />
  
  <!-- Base Orbs -->
  <circle cx="200" cy="80" r="90" fill="url(#orb1)" opacity="0.5" />
  <circle cx="600" cy="220" r="110" fill="url(#orb2)" opacity="0.5" />
  
  <g>
    <clipPath id="card-clip">
      <rect x="150" y="50" width="500" height="200" rx="24" />
    </clipPath>
    
    <g clip-path="url(#card-clip)">
      <rect x="0" y="0" width="800" height="300" fill="rgba(30, 30, 35, 0.4)" />
      <!-- Blurred Orbs for backdrop-filter effect -->
      <circle cx="200" cy="80" r="90" fill="url(#orb1)" opacity="0.5" filter="url(#glass-blur)" />
      <circle cx="600" cy="220" r="110" fill="url(#orb2)" opacity="0.5" filter="url(#glass-blur)" />
    </g>
    
    <rect x="150" y="50" width="500" height="200" rx="24" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2" />
    
    <text x="400" y="140" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="700" fill="#e0e0e4" text-anchor="middle" letter-spacing="1">WELCOME</text>
    <text x="400" y="175" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="400" fill="#8a8a9a" text-anchor="middle">Crafting digital experiences</text>
  </g>
</svg>
