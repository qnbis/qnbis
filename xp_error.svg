<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="xp-title-err" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0058e6" />
      <stop offset="10%" stop-color="#3a93ff" />
      <stop offset="100%" stop-color="#0058e6" />
    </linearGradient>
    <style>
      .window { fill: #ece9d8; stroke: #0058e6; stroke-width: 3; rx: 8; ry: 8; }
      .titlebar { fill: url(#xp-title-err); }
      .title-text { font-family: 'Tahoma', sans-serif; font-size: 14px; font-weight: bold; fill: white; text-shadow: 1px 1px 2px #000; }
      .btn-close { fill: #e04343; stroke: #fff; stroke-width: 1; rx: 3; }
      .btn-text { font-family: 'Tahoma', sans-serif; font-size: 12px; font-weight: bold; fill: white; }
      .err-text { font-family: 'Tahoma', sans-serif; font-size: 13px; fill: #000; }
      .ok-btn { fill: #f5f5f5; stroke: #003c74; stroke-width: 1; rx: 3; }
      .ok-text { font-family: 'Tahoma', sans-serif; font-size: 12px; fill: #000; }
      .shadow { fill: rgba(0,0,0,0.2); rx: 8; ry: 8; }
    </style>
  </defs>

  <rect x="15" y="15" width="380" height="180" class="shadow" />
  
  <rect x="10" y="10" width="380" height="180" class="window" />
  
  <path d="M10 18 Q10 10 18 10 L382 10 Q390 10 390 18 L390 40 L10 40 Z" class="titlebar" />
  <text x="20" y="28" class="title-text">Task Manager</text>
  
  <rect x="360" y="15" width="20" height="20" class="btn-close" />
  <text x="366" y="30" class="btn-text">X</text>

  <circle cx="50" cy="80" r="20" fill="#e04343" stroke="#fff" stroke-width="2"/>
  <path d="M38 68 L62 92 M62 68 L38 92" stroke="#fff" stroke-width="4" stroke-linecap="round"/>

  <text x="90" y="75" class="err-text">Warning: Too much awesome code detected.</text>
  <text x="90" y="95" class="err-text">Proceed at your own risk!</text>
  
  <rect x="150" y="140" width="100" height="30" class="ok-btn" />
  <rect x="152" y="142" width="96" height="26" fill="none" stroke="#fff" stroke-width="1" rx="2" />
  <text x="187" y="160" class="ok-text">OK</text>
</svg>
