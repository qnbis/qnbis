<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f5f5f7" />
    </radialGradient>
    <linearGradient id="orb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D55" />
      <stop offset="100%" stop-color="#FF9500" />
    </linearGradient>
    <linearGradient id="orb2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE" />
      <stop offset="100%" stop-color="#32ADE6" />
    </linearGradient>
    <filter id="glass-blur">
      <feGaussianBlur stdDeviation="20" />
    </filter>
  </defs>

  <rect width="800" height="300" fill="url(#bg)" rx="16" />
  
  <circle cx="200" cy="80" r="90" fill="url(#orb1)" opacity="0.6" />
  <circle cx="600" cy="220" r="110" fill="url(#orb2)" opacity="0.6" />
  
  <g>
    <clipPath id="card-clip">
      <rect x="150" y="50" width="500" height="200" rx="24" />
    </clipPath>
    
    <g clip-path="url(#card-clip)">
      <rect x="0" y="0" width="800" height="300" fill="rgba(255, 255, 255, 0.4)" />
      <circle cx="200" cy="80" r="90" fill="url(#orb1)" opacity="0.6" filter="url(#glass-blur)" />
      <circle cx="600" cy="220" r="110" fill="url(#orb2)" opacity="0.6" filter="url(#glass-blur)" />
    </g>
    
    <rect x="150" y="50" width="500" height="200" rx="24" fill="none" stroke="rgba(255, 255, 255, 0.6)" stroke-width="2" />
    
    <text x="400" y="140" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="700" fill="#1d1d1f" text-anchor="middle" letter-spacing="1">WELCOME</text>
    <text x="400" y="175" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="400" fill="#86868b" text-anchor="middle">Crafting digital experiences</text>
  </g>
</svg>
