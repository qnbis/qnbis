<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');

      .bg { fill: #181818; }
      .text-title { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: bold; fill: #ffffff; }
      .text-subtitle { font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600; fill: #38bdf8; }
      .text-details { font-family: 'Fira Code', monospace; font-size: 10px; fill: #9ca3af; }
      
      /* Progress Bar Animation */
      .progress-bg { fill: #282828; rx: 2px; }
      .progress-fill { fill: #38bdf8; rx: 2px; animation: progressLoad 4s ease-in-out infinite alternate; }
      
      /* Terminal Cursor Animation */
      .cursor { fill: #10b981; animation: blink 1s step-end infinite; }
      
      /* Chip Pulsing */
      .glow-ring { stroke: #10b981; stroke-width: 1.5; fill: none; opacity: 0.4; animation: pulseRing 2s cubic-bezier(0.215, 0.610, 0.355, 1) infinite; }
      .glow-dot { fill: #10b981; }

      @keyframes progressLoad {
        0% { width: 0px; }
        100% { width: 180px; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes pulseRing {
        0% { transform: scale(0.95); opacity: 0.8; }
        100% { transform: scale(1.15); opacity: 0; }
      }
    </style>
    
    <clipPath id="avatar-clip">
      <rect x="20" y="20" width="80" height="80" rx="12" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" rx="16" class="bg" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- Avatar Area (Terminal Simulator) -->
  <g clip-path="url(#avatar-clip)">
    <!-- Terminal Background -->
    <rect x="20" y="20" width="80" height="80" fill="#0c0f17" />
    
    <!-- Code Grid/Lines in terminal -->
    <line x1="30" y1="35" x2="60" y2="35" stroke="#1e293b" stroke-width="3" stroke-linecap="round" />
    <line x1="30" y1="45" x2="70" y2="45" stroke="#1e293b" stroke-width="3" stroke-linecap="round" />
    <line x1="30" y1="55" x2="50" y2="55" stroke="#1e293b" stroke-width="3" stroke-linecap="round" />
    
    <!-- Blinking Prompt -->
    <text x="30" y="75" font-family="'Fira Code', monospace" font-size="14" font-weight="bold" fill="#10b981">&gt;</text>
    <rect x="46" y="63" width="8" height="13" class="cursor" />
  </g>
  <rect x="20" y="20" width="80" height="80" rx="12" fill="none" stroke="rgba(56, 189, 248, 0.2)" stroke-width="1.5" />

  <!-- Profile Details (Right Side) -->
  <g transform="translate(115, 20)">
    <!-- Title / Username -->
    <text x="0" y="15" class="text-title">qnbis</text>
    
    <!-- Status Dot -->
    <g transform="translate(48, 8)">
      <circle cx="0" cy="0" r="8" class="glow-ring" transform-origin="center" />
      <circle cx="0" cy="0" r="3.5" class="glow-dot" />
    </g>

    <!-- Subtitle / Role -->
    <text x="0" y="33" class="text-subtitle">System Architect</text>

    <!-- Tech Stack Details -->
    <text x="0" y="52" class="text-details">TS // Python // Docker // FastAPI</text>
    
    <!-- Progress Bar label -->
    <text x="0" y="68" font-family="'Outfit', sans-serif" font-size="9" font-weight="600" fill="#6b7280" letter-spacing="0.5px">AUTONOMY ENGINE STATUS</text>

    <!-- Progress Bar (Dynamic slider) -->
    <rect x="0" y="74" width="220" height="6" class="progress-bg" />
    <rect x="0" y="74" width="180" height="6" class="progress-fill" />
  </g>

</svg>
