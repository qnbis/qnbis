<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="xp-title" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0058e6" />
      <stop offset="10%" stop-color="#3a93ff" />
      <stop offset="100%" stop-color="#0058e6" />
    </linearGradient>
    <style>
      .window { fill: #ece9d8; stroke: #0058e6; stroke-width: 3; rx: 8; ry: 8; }
      .titlebar { fill: url(#xp-title); }
      .title-text { font-family: 'Tahoma', sans-serif; font-size: 14px; font-weight: bold; fill: white; text-shadow: 1px 1px 2px #000; }
      .btn { fill: #ece9d8; stroke: #fff; stroke-width: 1; rx: 3; }
      .btn-close { fill: #e04343; stroke: #fff; stroke-width: 1; rx: 3; }
      .btn-text { font-family: 'Tahoma', sans-serif; font-size: 12px; font-weight: bold; fill: white; }
      .btn-text-black { font-family: 'Tahoma', sans-serif; font-size: 12px; font-weight: bold; fill: black; }
      .content-text { font-family: 'Tahoma', sans-serif; font-size: 16px; fill: #000; }
      .code-bg { fill: #000; stroke: #7f9db9; stroke-width: 2; }
      .code-text { font-family: 'Courier New', monospace; font-size: 14px; fill: #00ff00; }
      .prompt { fill: #fff; }
    </style>
  </defs>

  <rect x="10" y="10" width="780" height="280" class="window" />
  
  <path d="M10 18 Q10 10 18 10 L782 10 Q790 10 790 18 L790 40 L10 40 Z" class="titlebar" />
  <text x="20" y="28" class="title-text">C:\Windows\System32\cmd.exe</text>
  
  <rect x="710" y="15" width="20" height="20" class="btn" />
  <text x="716" y="29" class="btn-text-black">_</text>
  
  <rect x="735" y="15" width="20" height="20" class="btn" />
  <rect x="739" y="19" width="12" height="12" fill="none" stroke="black" stroke-width="2" />
  
  <rect x="760" y="15" width="20" height="20" class="btn-close" />
  <text x="765" y="30" class="btn-text">X</text>

  <rect x="20" y="55" width="760" height="220" class="code-bg" />
  
  <text x="30" y="80" class="code-text prompt">Microsoft Windows XP [Version 5.1.2600]</text>
  <text x="30" y="100" class="code-text prompt">(C) Copyright 1985-2001 Microsoft Corp.</text>
  
  <text x="30" y="130" class="code-text prompt">C:\Users\Admin&gt; whoami</text>
  <text x="30" y="150" class="code-text">qnbis - The Code Architect</text>
  
  <text x="30" y="180" class="code-text prompt">C:\Users\Admin&gt; type skills.txt</text>
  <text x="30" y="200" class="code-text">Python | TypeScript | React | Docker | SQL</text>
  
  <text x="30" y="230" class="code-text prompt">C:\Users\Admin&gt; start build_future.bat</text>
  <text x="30" y="250" class="code-text">Executing... [████████████████████] 100%</text>
  
  <text x="30" y="270" class="code-text prompt">C:\Users\Admin&gt; _</text>
  <rect x="175" y="260" width="8" height="12" fill="#00ff00">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
