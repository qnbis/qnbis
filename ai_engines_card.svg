<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');

      .bg { fill: #181818; }
      .text-header { font-family: 'Outfit', sans-serif; font-size: 9px; font-weight: 800; fill: #6b7280; letter-spacing: 1px; }
      .text-label { font-family: 'Outfit', sans-serif; font-size: 9px; font-weight: 600; fill: #9ca3af; }
      
      /* Glowing drop-shadow filters */
      .glow-openai { filter: drop-shadow(0 0 5px rgba(16, 163, 127, 0.6)); }
      .glow-claude { filter: drop-shadow(0 0 5px rgba(217, 119, 83, 0.6)); }
      .glow-gemini { filter: drop-shadow(0 0 5px rgba(168, 85, 247, 0.6)); }
      .glow-deepseek { filter: drop-shadow(0 0 5px rgba(0, 112, 243, 0.6)); }
      .glow-midjourney { filter: drop-shadow(0 0 5px rgba(192, 132, 252, 0.6)); }

      /* Animation for gentle floating */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
      }
      .anim-f1 { animation: float 3s ease-in-out infinite; }
      .anim-f2 { animation: float 3s ease-in-out infinite; animation-delay: 0.6s; }
      .anim-f3 { animation: float 3s ease-in-out infinite; animation-delay: 1.2s; }
      .anim-f4 { animation: float 3s ease-in-out infinite; animation-delay: 1.8s; }
      .anim-f5 { animation: float 3s ease-in-out infinite; animation-delay: 2.4s; }
    </style>

    <!-- Gradients -->
    <linearGradient id="gemini-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="deepseek-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00dfd8" />
      <stop offset="100%" stop-color="#0070f3" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" rx="16" class="bg" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- Section Title -->
  <text x="20" y="22" class="text-header">NEURAL CORE INTEGRATIONS</text>

  <!-- Logos Container -->
  
  <!-- 1. OpenAI / ChatGPT (X Center = 70) -->
  <g transform="translate(70, 50)" class="anim-f1">
    <g class="glow-openai" transform="translate(-18, -18)">
      <!-- OpenAI Logo Circle background -->
      <circle cx="18" cy="18" r="16" fill="#10a37f" />
      <!-- Spiral shape -->
      <path d="M18,9 C15,9 13,11 13,14 L13,20 C13,21.5 14.5,23 16,23 L22,23 C23.5,23 25,21.5 25,20 L25,14 C25,11 23,9 18,9 Z" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" />
      <path d="M12,18 C12,15 14,13 17,13 L23,13 C24.5,13 26,14.5 26,16 L26,22 C26,23.5 24.5,25 23,25 L17,25 C14,25 12,23 12,18 Z" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" opacity="0.8" />
    </g>
    <!-- Label -->
    <text x="0" y="40" class="text-label" text-anchor="middle">OpenAI</text>
  </g>

  <!-- 2. Claude (X Center = 135) -->
  <g transform="translate(135, 50)" class="anim-f2">
    <g class="glow-claude" transform="translate(-18, -18)">
      <!-- Claude clay-orange stylized emblem -->
      <circle cx="18" cy="18" r="16" fill="#1f1f1f" stroke="#d97753" stroke-width="1.5" />
      <!-- Anthropic dynamic wave shape -->
      <path d="M 10,22 C 12,14 15,10 20,10 C 24,10 26,15 26,22" fill="none" stroke="#d97753" stroke-width="3.5" stroke-linecap="round" />
      <circle cx="18" cy="19" r="3.5" fill="#d97753" />
    </g>
    <text x="0" y="40" class="text-label" text-anchor="middle">Claude</text>
  </g>

  <!-- 3. Gemini (X Center = 200) -->
  <g transform="translate(200, 50)" class="anim-f3">
    <g class="glow-gemini" transform="translate(-18, -18)">
      <!-- Dark container for contrast -->
      <circle cx="18" cy="18" r="16" fill="#1f1f1f" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
      <!-- Sparkle -->
      <path d="M 18,3 Q 18,18 33,18 Q 18,18 18,33 Q 18,18 3,18 Q 18,18 18,3 Z" fill="url(#gemini-grad)" />
    </g>
    <text x="0" y="40" class="text-label" text-anchor="middle">Gemini</text>
  </g>

  <!-- 4. DeepSeek (X Center = 265) -->
  <g transform="translate(265, 50)" class="anim-f4">
    <g class="glow-deepseek" transform="translate(-18, -18)">
      <circle cx="18" cy="18" r="16" fill="#1f1f1f" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
      <!-- Whale fin / shield design -->
      <path d="M 9,10 C 9,10 14,8 18,12 C 22,8 27,10 27,10 C 27,17 21,24 18,26 C 15,24 9,17 9,10 Z" fill="url(#deepseek-grad)" />
      <circle cx="18" cy="17" r="3" fill="#ffffff" />
    </g>
    <text x="0" y="40" class="text-label" text-anchor="middle">DeepSeek</text>
  </g>

  <!-- 5. Midjourney (X Center = 330) -->
  <g transform="translate(330, 50)" class="anim-f5">
    <g class="glow-midjourney" transform="translate(-18, -18)">
      <!-- Dark container -->
      <circle cx="18" cy="18" r="16" fill="#1f1f1f" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
      <!-- Sailboat logo -->
      <path d="M 10,24 C 13,16 23,16 26,24 Z" fill="none" stroke="#c084fc" stroke-width="2" />
      <path d="M 14,24 L 18,11 L 22,24" fill="none" stroke="#ffffff" stroke-width="1.5" />
      <circle cx="18" cy="8" r="1.5" fill="#c084fc" />
    </g>
    <text x="0" y="40" class="text-label" text-anchor="middle">Midjourney</text>
  </g>

</svg>
